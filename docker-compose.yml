services:
  zed2api:
    image: sunqb/zed2api:latest
    container_name: zed2api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - ACCOUNTS_FILE=/data/accounts.json
      - API_KEY=${API_KEY:-}
    volumes:
      # Mount the directory containing accounts.json (single-file bind mounts
      # are unreliable on some Docker setups)
      - ${ACCOUNTS_DIR:-~}:/data:ro
